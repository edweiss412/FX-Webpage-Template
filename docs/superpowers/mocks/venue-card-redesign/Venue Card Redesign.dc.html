<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #EDECEA; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: #C25E00; }
  a:hover { color: #FF8C1A; }
  .tnum { font-feature-settings: 'tnum' 1, 'cv11' 1; }
  .eyebrow { letter-spacing: 0.12em; text-transform: uppercase; }
  .maptile { background-image: repeating-linear-gradient(45deg, #ECEAE6 0 10px, #F4F3F1 10px 20px); }
</style>
</helmet>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 64px 32px;">
  <div style="width: 560px; background: #FFFFFF; border: 1px solid #E5E4E0; border-radius: 16px; box-shadow: 0 12px 32px rgba(20,18,12,0.08); overflow: hidden;">
    <div style="padding: 22px 24px; border-bottom: 1px solid #E5E4E0; display: flex; align-items: center; gap: 12px;">
      <div style="min-width: 0; flex: 1;">
        <div class="eyebrow" style="font-size: 11px; font-weight: 600; color: #8B8C92;">Reviewing sheet</div>
        <div style="font-size: 17px; font-weight: 700; color: #0E0F12; margin-top: 2px;">Acme Global Summit 2026</div>
      </div>
      <span style="display: inline-flex; align-items: center; justify-content: center; height: 28px; width: 28px; border-radius: 6px; border: 1px solid #E5E4E0; color: #5A5B62;">✕</span>
    </div>
    <div style="padding: 20px 24px 26px;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <span style="display: grid; place-items: center; height: 28px; width: 28px; border-radius: 6px; background: #F4F3F1; color: #5A5B62;">{{ pinSm }}</span>
        <h3 style="margin: 0; font-size: 16px; font-weight: 600; color: #0E0F12;">Venue</h3>
        <span style="flex: 1;"></span>
        <a href="#" style="display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: #5A5B62; text-decoration: none;">In sheet {{ extLink }}</a>
      </div>
      <div style="border: 1px solid #E5E4E0; border-radius: 12px; background: #FFFFFF; box-shadow: 0 1px 2px rgba(20,18,12,0.04); overflow: hidden;">
        <div style="display: flex; align-items: stretch;">
          <div style="flex: 1; min-width: 0; padding: 18px 18px 18px 20px; display: flex; flex-direction: column; gap: 4px;">
            <span class="eyebrow" style="font-size: 10px; font-weight: 600; color: #8B8C92;">Venue</span>
            <div style="font-size: 19px; font-weight: 700; color: #0E0F12; line-height: 1.22;">The Masonic Auditorium</div>
            <div style="font-size: 13px; color: #5A5B62; margin-top: 4px; line-height: 1.4;">1111 California St<br>San Francisco, CA 94108</div>
          </div>
          <a href="#" class="maptile" style="width: 172px; flex-shrink: 0; border-left: 1px solid #E5E4E0; position: relative; display: block; text-decoration: none;">
            <span style="position: absolute; top: 10px; left: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; color: #8B8C92; background: rgba(255,255,255,0.85); padding: 3px 6px; border-radius: 5px;">map</span>
            <span style="position: absolute; bottom: 10px; left: 10px; right: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 32px; border-radius: 6px; background: #FFFFFF; border: 1px solid #CFCDC7; font-size: 12px; font-weight: 600; color: #1A1B1F;">{{ nav }} Directions</span>
          </a>
        </div>
        <div style="border-top: 1px solid #E5E4E0; padding: 14px 20px; display: flex; align-items: flex-start; gap: 10px; background: #F4F3F1;">
          <span style="display: grid; place-items: center; height: 26px; width: 26px; border-radius: 6px; background: #FFFFFF; border: 1px solid #E5E4E0; color: #C25E00; flex-shrink: 0;">{{ dock }}</span>
          <div style="min-width: 0;">
            <span class="eyebrow" style="font-size: 10px; font-weight: 600; color: #8B8C92;">Loading dock</span>
            <div style="font-size: 13px; font-weight: 500; color: #1A1B1F; margin-top: 2px; line-height: 1.45;">Rear alley off Taylor St, 2 bays, 9ft clearance</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const mkPin = (size) => React.createElement(
      "svg",
      { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round" },
      React.createElement("path", { key: "p", d: "M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" }),
      React.createElement("circle", { key: "c", cx: 12, cy: 10, r: 3 })
    );
    const nav = React.createElement(
      "svg",
      { width: 15, height: 15, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round" },
      React.createElement("path", { key: "p", d: "M3 11l19-9-9 19-2-8-8-2z" })
    );
    const extLink = React.createElement(
      "svg",
      { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round" },
      React.createElement("path", { key: "p1", d: "M15 3h6v6" }),
      React.createElement("path", { key: "p2", d: "M10 14 21 3" }),
      React.createElement("path", { key: "p3", d: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" })
    );
    const dock = React.createElement(
      "svg",
      { width: 15, height: 15, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round" },
      React.createElement("rect", { key: "r", x: 2, y: 7, width: 14, height: 10, rx: 1 }),
      React.createElement("path", { key: "p", d: "M16 10h3l3 3v4h-6" }),
      React.createElement("circle", { key: "c1", cx: 7, cy: 19, r: 1.5 }),
      React.createElement("circle", { key: "c2", cx: 18, cy: 19, r: 1.5 })
    );
    return { pinSm: mkPin(16), nav, extLink, dock };
  }
}
</script>
</body>
</html>
