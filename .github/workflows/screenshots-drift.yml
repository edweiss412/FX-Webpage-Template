name: Screenshots drift

on:
  # Per-PR, run only when a render input could have changed — this job boots
  # Supabase + a Docker Playwright image (~280s), so firing it on PRs that touch
  # no rendered surface is pure waste. Captured surfaces are the admin routes
  # (manifest in scripts/help-screenshots.manifest.ts) rendered from the seeded
  # fixtures → parser → seed pipeline, so the allow-list spans both the render
  # side (app/**, components/**, globals.css via app/**) and the data side.
  # The `schedule` cron below stays UNFILTERED and is the full-coverage backstop
  # that catches drift on any PR this allow-list skipped (do not narrow it).
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/data/**"
      - "lib/audit/**"
      - "lib/admin/**"
      - "lib/messages/**"
      - "lib/parser/**"
      - "fixtures/shows/**"
      - "supabase/seed.ts"
      - "supabase/seedWalkerFixtures.ts"
      - "supabase/migrations/**"
      # The committed baselines themselves: the drift job re-captures and
      # `git diff --exit-code public/help/screenshots/`, so a PR that edits these
      # bytes directly must re-trigger verification (else a bad baseline ships
      # until the nightly cron). They are the comparison target, not just an input.
      - "public/help/screenshots/**"
      - "scripts/help-screenshots.ts"
      - "scripts/help-screenshots.manifest.ts"
      - "scripts/help-screenshots-fixture-range.ts"
      - "scripts/capture-launch-args.ts"
      - "scripts/ci/**"
      - "playwright.screenshots.config.ts"
      - "tests/e2e/helpers/**"
      - ".github/workflows/screenshots-drift.yml"
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

# Cancel a superseded run when the PR branch is re-pushed — this job boots
# Supabase + a Docker Playwright image, so a stale run holds a heavy runner.
# Including github.event_name keeps the nightly `schedule` run from ever sharing
# a group with a PR/dispatch run, so the full-coverage backstop can't be cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  screenshots-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          # Pinned (NOT `latest`): `latest` resolves via the GitHub API, which rate-limits
          # on shared runners and fails setup. 2.107.0 = the supabase-local-bootstrap.sh
          # known CI-passing version (PR #102; older 2.98.2 broke the in-container psql auth); a fixed version downloads directly (no API lookup).
          version: 2.107.0
      - name: Start Supabase (supply cron-schedule GUC; local-only placeholder)
        # Guarded-migration boot lives in the shared script (M12.12 Task 14) so
        # the hold-aside list cannot drift between workflows. Full rationale +
        # mechanism comments are in the script.
        run: bash scripts/ci/supabase-local-bootstrap.sh
      - name: Capture screenshots in pinned Playwright image
        run: |
          docker run --rm --platform linux/amd64 --network host \
            -v "$PWD:/work" \
            -w /work \
            -e CI=true \
            mcr.microsoft.com/playwright:v1.59.1-jammy \
            bash -lc "apt-get update && apt-get install -y postgresql-client && corepack enable && pnpm screenshot:help"
      - name: Check screenshot drift
        run: |
          git diff --exit-code public/help/screenshots/
          test -z "$(git ls-files --others --exclude-standard public/help/screenshots/)"
      # On drift, upload the freshly-captured bytes so the diff is inspectable
      # (PR #22 burned multiple round-trips diagnosing a one-file drift blind).
      - name: Upload drifted captures (diagnosis artifact)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: drifted-screenshots
          path: public/help/screenshots/
          retention-days: 7
