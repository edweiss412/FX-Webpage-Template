name: Screenshots drift

on:
  pull_request:
  schedule:
    - cron: "0 10 * * *"

jobs:
  screenshots-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm screenshot:help
      - run: git diff --exit-code public/help/screenshots/
