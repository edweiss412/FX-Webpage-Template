name: X audits

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  traceability-audit:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify generated admin tables file is fresh
        if: github.event_name != 'schedule'
        run: |
          pnpm gen:admin-tables
          git diff -- lib/audit/admin-tables.generated.ts > traceability-admin-tables-generated.diff
          git diff --exit-code lib/audit/admin-tables.generated.ts
      - name: Verify generated watermark-symbol file is fresh
        if: github.event_name != 'schedule'
        run: |
          pnpm gen:watermark-symbols
          git diff -- lib/audit/watermark-symbols.generated.ts > traceability-watermark-symbols-generated.diff
          git diff --exit-code lib/audit/watermark-symbols.generated.ts
      - name: Verify generated email-boundary file is fresh
        if: github.event_name != 'schedule'
        run: |
          pnpm gen:email-boundaries
          git diff -- lib/audit/email-boundaries.generated.ts > traceability-email-boundaries-generated.diff
          git diff --exit-code lib/audit/email-boundaries.generated.ts
      - name: Verify traceability coverage matrix is fresh
        if: github.event_name != 'schedule'
        run: |
          pnpm gen:traceability
          git diff -- docs/superpowers/plans/coverage.md > traceability-coverage-generated.diff
          git diff --exit-code docs/superpowers/plans/coverage.md
      - name: Run X.6 traceability audit
        shell: bash
        run: |
          set -o pipefail
          pnpm test:audit:traceability 2>&1 | tee traceability-audit.log
      - name: Upload X.6 traceability audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traceability-audit-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
          if-no-files-found: warn
          path: |
            traceability-admin-tables-generated.diff
            traceability-watermark-symbols-generated.diff
            traceability-email-boundaries-generated.diff
            traceability-coverage-generated.diff
            traceability-audit.log
            docs/superpowers/plans/coverage.md

