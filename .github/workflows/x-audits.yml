      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:admin-tables
      - name: Check generated admin-table manifest
        run: |
          git diff -- lib/audit/admin-tables.generated.ts > x3-trust-domain-generated.diff
          git diff --exit-code lib/audit/admin-tables.generated.ts
      - name: Run X.3 trust-domain audit
        shell: bash
        run: |
          set -o pipefail
          pnpm test:audit:x3-trust-domain 2>&1 | tee x3-trust-domain.log
      - name: Upload X.3 trust-domain audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x3-trust-domain-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
          if-no-files-found: warn
          path: |
            x3-trust-domain-generated.diff
            x3-trust-domain.log

  x4-no-global-cursor:
