  postgrest-dml-lockdown:
    # M12 Phase 0.B follow-up (2026-05-27): structural meta-test for AGENTS.md
    # cross-cutting "PostgREST DML lockdown for RPC-gated tables". Runs all
    # 3 layers (psql has_table_privilege + role=authenticated POSTREST 403 +
    # role=anon POSTREST 401-with-42501) against the validation Supabase
    # project. Layer 1 (psql) needs DATABASE_URL — the validation project's
    # direct Postgres URL via SUPABASE_TEST_DATABASE_URL (NOT the local
    # 127.0.0.1 default the in-test fallback uses, which would not resolve
    # in CI). Layers 2+3 need SUPABASE_TEST_REST_URL + SUPABASE_TEST_JWT_SECRET
    # to talk to the validation REST gateway. Operator wires the secret +
    # variable via `gh secret set` / `gh variable set` post-commit.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install psql (postgresql-client) for Layer 1
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run postgrest-dml-lockdown 3-layer meta-test
        shell: bash
        env:
          TEST_DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}
          SUPABASE_TEST_REST_URL: ${{ vars.SUPABASE_TEST_REST_URL }}
          SUPABASE_TEST_JWT_SECRET: ${{ secrets.SUPABASE_TEST_JWT_SECRET }}
          SUPABASE_TEST_PUBLISHABLE_KEY: ${{ vars.SUPABASE_TEST_PUBLISHABLE_KEY }}
        run: |
          set -o pipefail
          pnpm vitest run tests/db/postgrest-dml-lockdown.test.ts 2>&1 | tee postgrest-dml-lockdown.log
      - name: Upload postgrest-dml-lockdown audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgrest-dml-lockdown-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
          if-no-files-found: warn
          path: postgrest-dml-lockdown.log

  verify-branch-protection:
    # X6-D-1: solo-dev variant — branch protection removed, no team workflow.
    # See DEFERRED.md §X6-D-1 for re-enable triggers (second admin joins, etc.).
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run privileged branch-protection drift detector
        run: pnpm tsx scripts/verify-branch-protection.ts
        env:
          GH_APP_TOKEN: ${{ secrets.GH_APP_TOKEN }}
          BRANCH_PROTECTION_PAT: ${{ secrets.BRANCH_PROTECTION_PAT }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      - name: Upload branch-protection audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-branch-protection-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
          if-no-files-found: warn
          path: artifacts/branch-protection-report.json

  verify-branch-protection-status:
    # X6-D-1: solo-dev variant — branch protection removed, no team workflow.
    # Reader is dormant until the privileged job re-enables; see DEFERRED.md §X6-D-1.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert recent successful verify-branch-protection run on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_RUN_JSON=$(gh run list \
            --workflow=x-audits.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId,createdAt,headSha)
          echo "$LATEST_RUN_JSON"
          LATEST_RUN_ID=$(echo "$LATEST_RUN_JSON" | jq -r '.[0].databaseId // empty')
          LATEST_RUN_AT=$(echo "$LATEST_RUN_JSON" | jq -r '.[0].createdAt // empty')
          if [ -z "$LATEST_RUN_ID" ]; then
            echo "::error::No successful x-audits.yml run on main found."
            exit 1
          fi
          JOB_CONCLUSION=$(gh run view "$LATEST_RUN_ID" --json jobs \
            | jq -r '.jobs[] | select(.name=="verify-branch-protection") | .conclusion')
          if [ "$JOB_CONCLUSION" != "success" ]; then
            echo "::error::Latest x-audits.yml run had verify-branch-protection conclusion=$JOB_CONCLUSION."
            exit 1
          fi
          NOW_EPOCH=$(date -u +%s)
          RUN_EPOCH=$(date -u -d "$LATEST_RUN_AT" +%s)
          AGE_SECONDS=$((NOW_EPOCH - RUN_EPOCH))
          MAX_AGE_SECONDS=$((8 * 24 * 60 * 60))
          if [ "$AGE_SECONDS" -gt "$MAX_AGE_SECONDS" ]; then
            echo "::error::Latest verify-branch-protection success is stale: $AGE_SECONDS seconds."
            exit 1
          fi
          echo "OK: verify-branch-protection succeeded $AGE_SECONDS seconds ago."
      - name: Upload branch-protection-status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-branch-protection-status-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}
          if-no-files-found: ignore
          path: artifacts/branch-protection-status-report.json
