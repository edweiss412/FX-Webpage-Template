name: X audits

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  x1-catalog-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:spec-codes
      - name: Check generated spec-code manifest
        run: |
          git diff -- lib/messages/__generated__/spec-codes.ts > x1-catalog-parity-generated.diff
          git diff --exit-code lib/messages/__generated__/spec-codes.ts
      - name: Run X.1 catalog parity audit
        shell: bash
        run: |
          set -o pipefail
          pnpm test:audit:x1-catalog-parity 2>&1 | tee x1-catalog-parity.log
      - name: Upload X.1 catalog parity audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x1-catalog-parity
          if-no-files-found: warn
          path: |
            x1-catalog-parity-generated.diff
            x1-catalog-parity.log
