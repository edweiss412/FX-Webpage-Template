name: mutation-harness
# Exhaustive parser mutation-testing harness (audit rec 5). The corpus is 101,795
# mutants at ~54 ms/parse ≈ 92 min serial (Task 8 Step 1) — 37× the ~150 s a
# merge-gating unit-suite leg can absorb. So it runs OFF the merge path on a
# dedicated nightly job and is EXCLUDED from the default discovered suite; this
# job opts back IN via VITEST_INCLUDE_MUTATION_HARNESS=1. NOT a required check:
# a ledger divergence fails this nightly run and is triaged, not gating every PR.
# workflow_dispatch lets close-out verify green on the PR branch before merge.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly (off-peak)
  workflow_dispatch: {}
concurrency:
  group: mutation-harness-${{ github.ref }}
  cancel-in-progress: true
jobs:
  mutation-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2 # match unit-suite.yml (pinned, not `latest`)
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # match unit-suite.yml
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # NO supabase/setup-cli, psql, or bootstrap: the harness is pure-parser / DB-free.
      - name: Run exhaustive mutation harness (nightly, ~92 min)
        env:
          VITEST_INCLUDE_MUTATION_HARNESS: "1"
        run: pnpm exec vitest run tests/parser/mutationHarness.test.ts
