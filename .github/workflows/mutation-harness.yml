name: mutation-harness
# Exhaustive parser mutation-testing harness (audit rec 5). The corpus is 101,795
# mutants, split into 8 LPT-balanced shard files + 1 generation-only gates file
# (sharding spec §3) run by the env-gated `mutation` vitest project with
# fileParallelism:true — vitest's forks pool gives availableParallelism-1 = 3
# workers on this 4-vCPU runner, so expect ~60-75 min wall-clock (was 167 min
# serial) with live `[mutation shard i/8] n/total` progress lines in this log.
# Still far past any merge-gating leg budget, so it runs OFF the merge path on a
# dedicated nightly job and is EXCLUDED from the default discovered suite; this
# job opts back IN via VITEST_INCLUDE_MUTATION_HARNESS=1. NOT a required check:
# a ledger divergence fails this nightly run and is triaged, not gating every PR.
# workflow_dispatch lets close-out verify green on the PR branch before merge.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly (off-peak)
  workflow_dispatch: {}
  # pull_request path-filtered (Codex whole-diff R2 [medium]): workflow_dispatch on a NEW workflow
  # only works once the file is on the default branch, so it CANNOT validate this PR pre-merge. A
  # path-filtered pull_request trigger runs the workflow AS IT EXISTS ON THE PR HEAD, giving real-
  # Actions validation of the workflow + the ~70-min sharded harness on the branch BEFORE merge —
  # while staying OUT of branch-protection required checks (not merge-gating; a red run is triaged,
  # not a merge blocker). Scoped to harness-touching PRs only (the glob covers all 8 shard files +
  # the gates file — Codex sharding-spec R1 #2), so unrelated PRs never pay the cost.
  pull_request:
    paths:
      - ".github/workflows/mutation-harness.yml"
      - "tests/parser/mutation/**"
      - "tests/parser/mutationHarness.*.test.ts"
      # vitest wiring owns the mutation project's existence/includes — a wiring-only
      # PR must fire the real workflow too (whole-diff review advisory).
      - "vitest.config.ts"
      - "vitest.projects.ts"
# PR-only cancel (ci-workflow-speedup convention): re-pushing a PR cancels its superseded
# ~70-min run, but scheduled nightly runs never cancel each other.
concurrency:
  group: mutation-harness-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  mutation-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # Runs UNTRUSTED code (pnpm install + tests) on PR/feature-branch runs, so it holds NO
    # issues:write — least privilege (Codex #369 R2). All issue mutation is isolated to the
    # separate, gated `notify` job below, which runs no untrusted code.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2 # match unit-suite.yml (pinned, not `latest`)
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # match unit-suite.yml
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # NO supabase/setup-cli, psql, or bootstrap: the harness is pure-parser / DB-free.
      - name: Run sharded mutation harness (nightly, ~60-75 min at 3 workers)
        env:
          VITEST_INCLUDE_MUTATION_HARNESS: "1"
        run: pnpm exec vitest run --project mutation

  # Surface a scheduled red run as ONE deduped tracking issue (otherwise invisible: a non-required
  # check with no notification anyone reads). SEPARATE job so issues:write never reaches the
  # untrusted harness job. Gated to schedule OR a DEFAULT-BRANCH workflow_dispatch — a feature-branch
  # dispatch must not open/close the main-tracking issue, and pull_request runs already show red on
  # the PR's checks. Runs no untrusted code (github-script + API only; no checkout, no install) and
  # uses only trusted context.* values — no injection surface. always() so it still fires when the
  # harness job failed; it then branches on needs.mutation-harness.result.
  notify:
    needs: mutation-harness
    if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref_name == github.event.repository.default_branch)) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Surface a red nightly as a tracking issue
        if: ${{ needs.mutation-harness.result == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const label = "mutation-harness-red";
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly mutation-harness run failed: ${runUrl}`,
              "",
              "Triage by the labeled bucket in the failing shard assertion (reconcileLedger classification):",
              "- NEW untested holes (REGRESSION): a parser change stopped catching mutants. Investigate; do NOT re-bless.",
              "- FIXED holes: coverage improved. Delete those rows from tests/parser/mutation/knownHoles.ts (shrink the ledger).",
              "- DRIFTED fingerprints: benign IF parser output changed on purpose. Regenerate the ledger (BL-MUTATION-LEDGER-*).",
              "",
              "Auto-filed by mutation-harness.yml; auto-closes on the next green scheduled run.",
            ].join("\n");
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: label });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: "Mutation harness nightly is red", body, labels: [label] });
            }
      - name: Auto-close the tracking issue on green
        if: ${{ needs.mutation-harness.result == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const label = "mutation-harness-red";
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: label });
            for (const iss of open.data) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: iss.number,
                body: `Nightly mutation-harness is green again: ${runUrl}. Closing.`,
              });
              await github.rest.issues.update({ owner, repo, issue_number: iss.number, state: "closed" });
            }
