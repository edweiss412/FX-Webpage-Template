name: Help affordances (deep-link walker)
on:
  pull_request:
    paths:
      - "components/admin/**"
      - "app/admin/**"
      - "app/help/**"
      - "lib/messages/**"
      - "lib/admin/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "scripts/ci/**"
      - "supabase/migrations/**"
      - "supabase/seed.ts"
      - "supabase/seedWalkerFixtures.ts"
      - ".github/workflows/help-affordances.yml"
  workflow_dispatch:

# Cancel a superseded run when the PR branch is re-pushed — the walker boots
# Supabase + Playwright, so a stale run holds a heavy runner for ~6 min.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deep-link-walker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: supabase/setup-cli@v1
        with:
          # Pinned (NOT `latest`): `latest` resolves via the GitHub API, which rate-limits
          # on shared runners and fails setup. 2.107.0 = the supabase-local-bootstrap.sh
          # known CI-passing version (PR #102; older 2.98.2 broke the in-container psql auth); a fixed version downloads directly (no API lookup).
          version: 2.107.0
      - name: Install psql (db:seed shells out via execFileSync("psql", ...))
        run: command -v psql >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: Boot local Supabase (guarded migrations)
        run: bash scripts/ci/supabase-local-bootstrap.sh
      # webkit as well as chromium: the help-docs project spreads
      # devices["iPhone 14"], whose defaultBrowserType is webkit; the
      # help-docs-setup / help-docs-desktop projects run chromium.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      # Split from `install --with-deps`: install-deps (apt) always runs, but the
      # browser binaries are restored from the cache above on a hit (install is
      # then a fast no-op; on a miss it downloads + repopulates the cache).
      - run: pnpm exec playwright install-deps chromium webkit
      - run: pnpm exec playwright install chromium webkit
      # Restore the Next compiler cache for the :3004 help-docs webServer build
      # (playwright.config.ts:316 runs `pnpm build` with NEXT_DIST_DIR=
      # .next-screenshots-help — next.config distDir = NEXT_DIST_DIR ?? ".next").
      # Caches ONLY <distDir>/cache (the compiler cache, NOT build output), so a
      # warm build skips recompiling unchanged modules (~30s). Safe here: this
      # job is the deep-link WALKER (not a byte-comparison screenshot gate — it
      # asserts DOM affordances, not pixels), runs on the HOST (not the pinned
      # Docker container the screenshots gates use), and this workflow is NOT a
      # required check, so a cold-vs-warm build divergence can only fail the
      # walker's own assertions, never a merge-blocking pixel diff. `github.sha`
      # in the key makes each run save a fresh entry (cache entries are
      # immutable per key); restore-keys falls back to the most recent prefix.
      - name: Restore Next build cache (help-docs :3004 build)
        uses: actions/cache@v4
        with:
          path: .next-screenshots-help/cache
          key: ${{ runner.os }}-nextcache-help-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextcache-help-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextcache-help-
      - name: Run walker (mobile + desktop)
        env:
          # help-docs-setup.ts asserts these in the TEST-RUNNER process —
          # the webServer.env in playwright.config.ts only reaches the Next
          # server process, NOT the Playwright workers.
          ENABLE_TEST_AUTH: "true"
          TEST_AUTH_SECRET: "test-secret-fixture"
          # playwright test boots EVERY webServer entry in the default
          # config (ports 3000-3004), not just the 3004 one the walker
          # projects use. The 3000/3001/3002/3003 builds read
          # HASH_FOR_LOG_PEPPER at module evaluation (R41 PII-hash
          # contract) and only the 3004 entry carries an inline fallback —
          # locally .env.local supplies the rest; bare CI runners must get
          # it here so every child build inherits it (real-CI round 2).
          HASH_FOR_LOG_PEPPER: "fxav-r41-test-pepper-32-chars-min-deterministic"
          # Boot ONLY the :3004 webServer (the walker projects' sole target).
          # Without this, playwright cold-builds all five servers in parallel
          # and the with-admin-dev-flag wrapper's hold-aside window races the
          # other builds' type-checks (real-CI round 3).
          HELP_DOCS_WALKER_ONLY: "1"
        run: pnpm exec playwright test --project=help-docs-setup --project=help-docs --project=help-docs-desktop
      - name: Upload Playwright traces/report (diagnosis artifact)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: help-affordances-playwright-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            playwright-report/
            test-results/
          retention-days: 7
