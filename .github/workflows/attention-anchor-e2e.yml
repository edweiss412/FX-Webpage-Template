name: Attention anchor placement e2e (standalone harness)
# Runs the standalone real-browser anchored-placement spec
# (tests/e2e/attention-anchor-placement.spec.ts, standalone-chromium project) in real
# Chromium. The spec is FULLY self-contained: its beforeAll esbuild-bundles the live
# entry via tests/e2e/_step3ReviewModalBundle.mjs (Next "use server" elision + empty
# node builtins), compiles the token CSS with the Tailwind CLI, and serves it over its
# OWN node:http server — no app boot, no Supabase, no :3000-:3004.
#
# Why its own job: standalone.config.ts is an explicit allow-list that NO general CI
# workflow invokes (modal-header-layout-e2e.yml runs only three of its specs; the rest
# are dark), so this spec would silently prove nothing on main without a dedicated gate
# — the exact drift that broke the Step3 live bundle on main (#477/#479). This gate
# re-runs it on every change to the spec, its entry, the shared bundle helper, or the
# admin review surfaces it renders. workflow_dispatch so close-out can fire it via
# `gh workflow run`.
on:
  pull_request:
    paths:
      - "tests/e2e/attention-anchor-placement.spec.ts"
      - "tests/e2e/_attentionAnchorEntry.tsx"
      - "tests/e2e/_step3ReviewModalBundle.mjs"
      - "tests/e2e/standalone.config.ts"
      - "components/admin/wizard/step3ReviewSections.tsx"
      - "components/admin/review/**"
      - "components/admin/showpage/PublishedReviewModal.tsx"
      - "lib/admin/attentionAnchorAvailability.ts"
      - "lib/admin/attentionItems.ts"
      - "lib/admin/sectionAttention.ts"
      - "app/globals.css"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/attention-anchor-e2e.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  attention-anchor-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: pnpm exec playwright install-deps chromium
      - run: pnpm exec playwright install chromium
      - name: Run attention-anchor standalone placement spec (no webServer)
        run: pnpm test:e2e:attention-anchor
      - name: Upload Playwright traces/report (diagnosis artifact)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: attention-anchor-e2e-playwright-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            playwright-report/
            test-results/
          retention-days: 7
