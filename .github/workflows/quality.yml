name: Quality

# Lightweight, secret-free code-quality gate: eslint + tsc + prettier.
# Net-new (the repo had no lint/typecheck/format CI job). Uses the canonical
# checkout + `./.github/actions/setup` composite preamble (pnpm/action-setup ->
# setup-node -> install) shared by every workflow. workflow_dispatch is enabled so the gate can be verified on
# demand without waiting for a PR (real-CI-green is its own close-out gate).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel a superseded run when the PR branch is re-pushed: quality is the one
# branch-protection-required check, so cancelling the stale run frees the runner
# and gets the new commit to green faster. github.ref is per-PR (refs/pull/N/merge),
# so distinct PRs never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # All three run regardless of earlier failures so one PR run surfaces
      # every gate that is red, not just the first.
      - name: Lint (eslint)
        if: ${{ !cancelled() }}
        run: pnpm lint
      - name: Typecheck (tsc)
        # Fresh checkout has no .next, so tsc never sees the stale route-validator
        # types that only appear locally after a dev/build run.
        if: ${{ !cancelled() }}
        run: pnpm typecheck
      - name: Format check (prettier)
        if: ${{ !cancelled() }}
        run: pnpm format:check
