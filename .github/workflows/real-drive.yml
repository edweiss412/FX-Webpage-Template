name: Real Drive fixtures (live round-trip)
# Runs the creds-gated real-Drive round-trip test that the main unit-suite SKIPS
# for lack of a service-account credential. That skip is why a synthesis change
# could silently diverge the live production synthesis from the committed
# exporter-xlsx fixture (the 2026-06-18 "restore event_details" / "skip OLD tabs"
# fixes regenerated the exporter-xlsx fixtures but the round-trip test — pointed
# at the OLD raw renderer + skipped in CI — went red unnoticed). This job re-runs
# it whenever the synthesis / parser / exporter-xlsx fixtures change so that drift
# fails LOUDLY in CI.
#
# REQUIRES one repo secret to actually execute; without it the test skips
# gracefully and this job is a green no-op:
#   - GOOGLE_SERVICE_ACCOUNT_JSON : the fxav-reader service-account JSON
# (The sheet id is the fxav-test-shows COPY already published in
#  fixtures/shows/exporter-xlsx/README.md, so it is inlined, not a secret.)
on:
  pull_request:
    paths:
      - "lib/drive/exportSheetToMarkdown.ts"
      - "lib/drive/fetch.ts"
      - "lib/parser/**"
      - "fixtures/shows/exporter-xlsx/**"
      - "tests/drive/round-trip-fixture.test.ts"
      - ".github/workflows/real-drive.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: real-drive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-drive-round-trip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Live production synthesis round trip (all 7 production fixtures)
        env:
          # The 7 sheet ids are inlined in the test (public in the exporter-xlsx
          # README); the only secret needed is the service account.
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: pnpm exec vitest run tests/drive/round-trip-fixture.test.ts --passWithNoTests
