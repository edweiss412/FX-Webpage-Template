name: Unit + DB suite (full vitest gate)
# Root-cause fix for the "no CI gate runs the full `pnpm test` suite" gap:
# before this job, the workflows only ran TARGETED vitest files (x-audits,
# deep-link-walker, postgrest-dml-lockdown, affordance-matrix). The 6800+
# unit/DB tests that implementers + reviewers rely on for "all green" were
# NOT gated, so PRs merged with failing/stale tests undetected.
#
# TOPOLOGY — split by PROJECT, not by file (2026-07-20).
#
# The suite has two vitest projects (vitest.projects.ts): `serial`, which is
# DB-bound and runs fileParallelism:false, and `parallel`, whose files were
# verified to touch no database at all. Until now BOTH ran in every leg, so
# every leg booted Supabase — including for the ~294s of work that never opens
# a connection.
#
# Now they are separate matrix jobs:
#   unit-suite-db   — 6 legs, boots Supabase, runs ONLY --project=serial
#   unit-suite-nodb — 2 legs, boots NOTHING,  runs ONLY --project=parallel
#
# The no-DB legs skip supabase/setup-cli, the psql install, and the ~71s
# bootstrap entirely, cutting their fixed overhead from ~100s to ~30s. That
# saving is the entire point of the split; the topology meta-test fails if the
# no-DB job so much as mentions the bootstrap.
#
# Measured, not modelled (CI probe run 29758568301, one runner per project,
# whole project, no sharding): serial 690s, parallel 294s. Those two total 984s
# against the 1,264s the previous 8 mixed legs spent on vitest — the ~280s gap
# is per-leg startup and transform work, re-paid by every leg, which is why leg
# counts past ~12 stop buying anything.
#
# LEG COUNTS ARE SET BY RUNNER CONCURRENCY, NOT BY THE ARITHMETIC. Three
# topologies were measured on PR #517, all against a like-for-like PR baseline
# (run 29754822376: 8 legs, 3s start stagger, 253s max leg, 262s wall):
#
#   12+4 (run 29760670825): max leg 182s -- the predicted per-leg win -- but
#         16 legs could not all start at once. Starts staggered +0s..+171s and
#         the WALL REGRESSED to 342s.
#   8+3  (run 29761339451): max leg 195s, stagger still 43s, wall 246s. Only
#         16s better than baseline; the stagger ate the per-leg gain.
#   6+2  (this): total legs held at 8 -- the count proven to start within 3s --
#         and rebalanced across the split instead of added to.
#
# Total legs are therefore capped at 8. The split still pays at that cap because
# the 2 no-DB legs skip the ~71s boot, so 690s of serial work spreads over 6 legs
# that each pay ~100s while 294s of parallel work rides 2 legs paying ~30s.
# Adding legs past 8 buys per-leg time and loses more to queueing.
#
# COVERAGE: `--project` plus `--shard` must not drop files. Two guarantees
# compose. vitest-projects-partition.test.ts pins that every non-nightly test
# file lands in exactly ONE default project; unit-suite-shard-topology.test.ts
# pins that each job runs exactly one project and that each job's --shard
# denominator equals its own matrix length. Together: every file runs exactly
# once. A red leg cannot green the gate — the aggregator `unit-suite` (the
# REQUIRED check-context name) needs BOTH jobs and fails unless BOTH rolled up
# success.
#
# Three files are EXCLUDED via VITEST_EXCLUDE_ENV_BOUND=1 (a project-level
# exclude in vitest.config.ts) — they need environments this local-bootstrap
# runner cannot provide, or starve under full-suite concurrency. (That rationale
# once said "the 2-core runner"; measured 2026-07-20, these runners are 4-core /
# 15.6 GiB AMD EPYC — public-repo runners were upgraded. The starvation reason
# stands on its own; the core count was stale and had already been cited as
# grounds for a since-retracted optimization proposal.) Each excluded file is
# gated elsewhere, so excluding them here is not a regression:
#   - tests/cross-cutting/pg-cron-coverage.test.ts — live-DB cron.job
#     introspection; runs against the validation project (like
#     validation-schema-parity). The bootstrap holds aside the GUC-guarded
#     pg_cron migrations, so no cron jobs exist locally.
#   - tests/admin/test-auth-gate.test.ts — drives a real auth.admin.createUser →
#     signInWithPassword chain needing the running instance's service-role key.
#   - tests/cross-cutting/email-canonicalization.test.ts — 15s per-test
#     doc-scans that starve under concurrency (gated standalone by x5).
# It MUST be the env var, NOT `vitest run --exclude` — vitest IGNORES the CLI
# `--exclude` flag once a project defines its own `exclude` (the serial project
# does). The gate keeps those files runnable by x-audits' direct
# `vitest run <file>` and by local `pnpm test`.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-suite-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-suite-db:
    name: unit-suite-db
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: supabase/setup-cli@v1
        with:
          # Pinned (NOT `latest`): `latest` resolves via the GitHub API, which
          # rate-limits on shared runners and fails setup. unit-suite is a
          # REQUIRED check, so a setup rate-limit flake would block merges.
          # 2.107.0 = the supabase-local-bootstrap.sh known CI-passing version.
          version: 2.107.0
      - name: Install psql (local-DB tests + bootstrap shell out to psql)
        run: command -v psql >/dev/null || (sudo apt-get update && sudo apt-get install -y postgresql-client)
      - name: Boot local Supabase (guarded migrations)
        # Shared bootstrap — same Supabase + GUC + guarded-migration setup
        # dev-gate-e2e.yml / screenshots-drift.yml use, so the hold-aside list
        # cannot drift between workflows. Each matrix leg boots its OWN instance.
        run: bash scripts/ci/supabase-local-bootstrap.sh
      - name: Run serial project, shard ${{ matrix.shard }}/6
        # fileParallelism:false still holds WITHIN a leg, and legs never share a
        # database (separate runners), so the serial-DB guarantee is unchanged.
        env:
          VITEST_EXCLUDE_ENV_BOUND: "1"
        run: pnpm exec vitest run --project=serial --shard=${{ matrix.shard }}/6

  unit-suite-nodb:
    name: unit-suite-nodb
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # No supabase/setup-cli, no psql, no bootstrap — deliberately. The parallel
      # project touches no database (CI probe run 29758568301 ran all 693 of its
      # files against a runner with none installed; the only two that failed were
      # moved to serial in the same change). Adding a boot here would silently
      # hand back the ~71s per leg this job exists to save, so the topology
      # meta-test asserts this job never mentions the bootstrap.
      - name: Run parallel project, shard ${{ matrix.shard }}/2
        env:
          VITEST_EXCLUDE_ENV_BOUND: "1"
        run: pnpm exec vitest run --project=parallel --shard=${{ matrix.shard }}/2

  unit-suite:
    # Aggregator — PRESERVES the `unit-suite` required check-context name so
    # branch protection needs no change. Green only when EVERY leg of BOTH
    # matrix jobs passed (needs.<job>.result is `success` iff all its legs
    # succeeded). `if: always()` runs it even when a leg fails, so the required
    # context reports an explicit failure rather than a never-reported skip.
    #
    # Both results are checked. Gating on only one would silently stop half the
    # suite from blocking merges while the check still reported green.
    name: unit-suite
    needs: [unit-suite-db, unit-suite-nodb]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every leg of both matrix jobs to have succeeded
        run: |
          db='${{ needs.unit-suite-db.result }}'
          nodb='${{ needs.unit-suite-nodb.result }}'
          echo "unit-suite-db rollup:   $db"
          echo "unit-suite-nodb rollup: $nodb"
          test "$db" = "success"
          test "$nodb" = "success"
