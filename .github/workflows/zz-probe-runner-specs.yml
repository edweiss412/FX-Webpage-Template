name: PROBE runner specs (temporary)
on:
  push:
    branches: [chore/probe-runner-specs]
jobs:
  specs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report CPU, memory, disk
        run: |
          echo "nproc:           $(nproc)"
          echo "model:           $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2- | xargs)"
          echo "MemTotal:        $(grep MemTotal /proc/meminfo | awk '{print $2/1024/1024" GiB"}')"
          echo "disk (/):        $(df -h / | awk 'NR==2{print $2" total, "$4" free"}')"
          echo "docker version:  $(docker --version)"
      - name: Time a representative extraction (single 1.3GB image)
        run: |
          start=$(date +%s)
          docker pull -q public.ecr.aws/supabase/storage-api:v1.58.17 >/dev/null 2>&1 || true
          echo "storage-api pull+extract: $(( $(date +%s) - start ))s"
